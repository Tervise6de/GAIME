<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>STORMWARDEN — prototype</title>
<style>
  html,body{margin:0;padding:0;background:#05070a;overflow:hidden;height:100%;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:#dce6ee}
  #stage{display:flex;height:100%}
  #mapwrap{flex:1;display:flex;align-items:center;justify-content:center;min-width:0}
  canvas{max-width:100%;max-height:100vh;aspect-ratio:16/9;image-rendering:auto;
    box-shadow:0 0 0 1px #1b2430}
  #panel{width:300px;flex:none;background:#0b0f15;border-left:1px solid #1b2430;
    padding:14px 16px;font-size:13px;line-height:1.5;overflow:auto}
  #panel .ttl{font-size:15px;font-weight:bold;color:#ffd27d}
  #panel .ttl2{font-weight:bold;color:#9fd0ff;margin-bottom:4px}
  #panel .sub{color:#6f8093;font-size:11px;margin-bottom:6px}
  #panel hr{border:none;border-top:1px solid #1b2430;margin:9px 0}
  #panel .row{display:flex;justify-content:space-between}
  #panel .row b{color:#eef4fa}
  #panel .tend{color:#ffb27d;font-size:12px;margin:-1px 0 4px}
  #panel .dim{color:#6f8093;font-size:11px}
  #panel .opt{padding:2px 6px;border-radius:4px;color:#b7c4d0}
  #panel .opt.sel{background:#17324e;color:#fff;font-weight:bold}
  #panel .conf{margin-top:6px;color:#b7c4d0}
  #panel .go{margin-top:8px;color:#7fe3a0;font-size:12px}
  #banner{position:fixed;left:0;bottom:0;right:300px;padding:8px 16px;
    background:rgba(5,7,10,.82);border-top:1px solid #1b2430;font-size:13px}
  #banner b{color:#eef4fa}
</style>
</head>
<body>
<div id="stage">
  <div id="mapwrap"><canvas id="cv" width="1280" height="720"></canvas></div>
  <div id="panel"></div>
</div>
<div id="banner"></div>
<script type="module" src="js/main.js"></script>
</body>
</html>
