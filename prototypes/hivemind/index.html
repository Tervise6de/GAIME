<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>HIVEMIND — prototype</title>
<style>
  html,body{margin:0;padding:0;background:#070505;overflow:hidden;height:100%}
  #wrap{display:flex;align-items:center;justify-content:center;height:100%}
  canvas{image-rendering:auto;max-width:100vw;max-height:100vh;aspect-ratio:16/9;cursor:crosshair}
  #hud{position:fixed;left:12px;top:10px;color:#cfe8e4;font:13px/1.5 ui-monospace,monospace;
       text-shadow:0 1px 2px #000;user-select:none;pointer-events:none}
  #hud b{color:#ffd27d}
  #legend{position:fixed;right:12px;top:10px;color:#9db8b4;font:12px/1.6 ui-monospace,monospace;
       text-align:right;text-shadow:0 1px 2px #000;user-select:none;pointer-events:none}
  #legend span{font-weight:bold}
</style>
</head>
<body>
<div id="wrap"><canvas id="cv" width="1280" height="720"></canvas></div>
<div id="hud"></div>
<div id="legend">
  <span style="color:#59e3d2">[1] LURE</span> &nbsp;<span style="color:#b08cff">[2] FEAR</span> &nbsp;<span style="color:#ff6a5e">[3] RALLY</span><br>
  paint: left mouse &nbsp;·&nbsp; erase: right mouse<br>
  brush size: wheel &nbsp;·&nbsp; pause: P<br>
  the colony is not yours to command —<br>only to persuade
</div>
<script type="module" src="js/main.js"></script>
</body>
</html>
